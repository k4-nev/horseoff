<div class="adm-wrap">
  <div class="adm-left">
    <div class="adm-left-head">
      <span class="adm-left-title">Пользователи</span>
      <div class="adm-left-actions">
        <button class="adm-icon-btn" onclick="Admin.openDefaults()" title="Модули по умолчанию"><span class="ico ico-16 ico-settings"></span></button>
        <button class="adm-icon-btn add" onclick="Admin.openAdd()" title="Добавить"><span style="font-size:18px;line-height:1">+</span></button>
      </div>
    </div>
    <input class="adm-search" id="admSearch" placeholder="Поиск..." oninput="Admin.filter(this.value)"/>
    <div class="adm-user-list" id="admList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
  <div class="adm-right" id="admRight">
    <div class="adm-empty" id="admEmpty">
      <span class="ico ico-24 ico-users" style="opacity:0.2"></span>
      <p>Выберите пользователя</p>
    </div>
    <div class="adm-detail" id="admDetail" style="display:none">
      <div class="adm-detail-header">
        <button class="adm-back-btn" onclick="Admin.clearDetail()"><span class="ico ico-18 ico-back"></span></button>
        <div class="adm-detail-ava" id="admDetailAva"></div>
        <div class="adm-detail-info">
          <div class="adm-detail-name" id="admDetailName">—</div>
          <div class="adm-detail-meta"><span class="adm-detail-role" id="admDetailRole">—</span> · <span id="admDetailDate"></span></div>
        </div>
        <div class="adm-detail-actions">
          <button class="adm-icon-btn" onclick="Admin.openEdit(Admin.selectedUser)" title="Редактировать"><span class="ico ico-16 ico-pencil"></span></button>
          <button class="adm-icon-btn del" id="admDetailDelBtn" onclick="Admin.openDelete(Admin.selectedUser)" title="Удалить"><span class="ico ico-16 ico-trash"></span></button>
        </div>
      </div>
      <div class="adm-section-title">Доступ к модулям</div>
      <div class="adm-modules" id="admModules"></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="admAddModal"><div class="modal">
  <div class="modal-header"><div class="modal-title" id="admModalTitle">Добавить пользователя</div><button class="modal-close" onclick="Shell.closeModal('admAddModal')"><span class="ico ico-18 ico-close"></span></button></div>
  <input type="hidden" id="admEditId"/>
  <div class="form-group"><label class="form-label">Логин</label><input class="form-input" id="adm-name" placeholder="username"/><div class="form-hint">Только английские буквы и цифры</div></div>
  <div class="form-group"><label class="form-label">Имя (необязательно)</label><input class="form-input" id="adm-display" placeholder="Имя Фамилия"/></div>
  <div class="form-group"><label class="form-label">Пароль</label><div class="input-eye"><input class="form-input" id="adm-pass" type="password" placeholder="••••••"/><button class="eye-btn" onclick="Shell.toggleEye(this)" type="button"><span class="ico ico-16 ico-eye-open"></span></button></div></div>
  <div class="form-group"><label class="form-label">Роль</label><div class="adm-role-picker" id="admRolePicker"><div class="adm-role-selected" id="admRoleSelected" onclick="Admin.toggleRolePicker()"><span class="role-badge common" id="admRoleBadge">COMMON</span><span class="adm-role-arrow">▾</span></div><div class="adm-role-dropdown" id="admRoleDropdown"></div><input type="hidden" id="adm-role" value="common"/></div></div>
  <div class="modal-actions"><button class="btn btn-secondary" onclick="Shell.closeModal('admAddModal')">Отмена</button><button class="btn btn-primary" id="admSaveBtn" onclick="Admin.save()">Создать</button></div>
</div></div>
<div class="modal-overlay" id="admDelModal"><div class="modal">
  <div class="modal-header"><div class="modal-title">Удалить пользователя?</div><button class="modal-close" onclick="Shell.closeModal('admDelModal')"><span class="ico ico-18 ico-close"></span></button></div>
  <div style="color:var(--text-dim);font-size:14px;margin-bottom:12px">Пользователь будет удалён из системы.</div>
  <div class="form-input" id="admDelInfo" style="margin-bottom:12px">--</div>
  <div class="modal-actions"><button class="btn btn-secondary" onclick="Shell.closeModal('admDelModal')">Отмена</button><button class="btn btn-danger" onclick="Admin.confirmDelete()">Удалить</button></div>
</div></div>
<div class="modal-overlay" id="admDefaultsModal"><div class="modal">
  <div class="modal-header"><div class="modal-title">Модули по умолчанию</div><button class="modal-close" onclick="Shell.closeModal('admDefaultsModal')"><span class="ico ico-18 ico-close"></span></button></div>
  <div style="color:var(--text-dim);font-size:13px;margin-bottom:14px">При создании нового пользователя будут включены:</div>
  <div id="admDefaultModules"></div>
  <div class="modal-actions"><button class="btn btn-primary" onclick="Admin.saveDefaults()">Сохранить</button></div>
</div></div>
