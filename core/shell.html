<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,interactive-widget=resizes-content,viewport-fit=cover">
<title>Horseoff</title>
<meta name="theme-color" content="#0a0a0f" id="metaThemeColor">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/pwa/manifest.json">
<link rel="apple-touch-icon" href="/pwa/icon-192.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='155 100 195 295'%3E%3Cg transform='translate(505,0) scale(-1,1)'%3E%3Crect x='202.843' y='339.947' fill='%2300d4aa' width='122.157' height='45.529'/%3E%3Crect x='175' y='339.947' fill='%2300a888' width='27.843' height='45.529'/%3E%3Crect x='182.95' y='299.899' fill='%2300d4aa' width='133.277' height='34.786'/%3E%3Crect x='182.959' y='299.899' fill='%2300a888' width='46.326' height='34.786'/%3E%3Cpath fill='%2300d4aa' d='M214.627,294.646c0,0-18.763-22.139-17.332-31.296c1.76-11.267,49.999-66.548,49.999-66.548c-12.83-8.554-51.174,22.887-51.174,22.887s-21.001-17.957-18.272-19.29c9.236-5.005,3.256-3.985-0.346-6.766c3.245-15.14,14.442-12.786,40.568-49.999c11.264-16.045,4.758-16.249,4.758-16.249l1.769-12.861c10.344,12.643,83.146,34.762,88.893,91.08c5.747,56.318-26.453,89.041-26.453,89.041H214.627z'/%3E%3Cpath fill='%2300a888' d='M216.038,205.562c-10.818,6.664-19.919,14.127-19.919,14.127s-21.001-17.957-18.271-19.29c9.236-5.006,3.256-3.985-0.346-6.766c2.722-12.699,11.037-13.091,29.063-34.843l0,0C196.058,179.804,216.038,205.562,216.038,205.562z'/%3E%3Cpath fill='%2300a888' d='M220.978,228.34c-7.005,24.224,38.652,66.306,38.652,66.306h-45.004c0,0-18.94-22.169-17.332-31.296C198.65,255.656,220.978,228.34,220.978,228.34z'/%3E%3C/g%3E%3C/svg%3E">
<link rel="stylesheet" href="/core/shell.css">
</head>
<body>
<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
<div class="login-box">
<div class="login-logo"><div class="logo-icon"><svg viewBox="155 100 195 295" xmlns="http://www.w3.org/2000/svg"><g transform="translate(505,0) scale(-1,1)"><rect x="202.843" y="339.947" fill="#00d4aa" width="122.157" height="45.529"/><rect x="175" y="339.947" fill="#00a888" width="27.843" height="45.529"/><rect x="182.95" y="299.899" fill="#00d4aa" width="133.277" height="34.786"/><rect x="182.959" y="299.899" fill="#00a888" width="46.326" height="34.786"/><path fill="#00d4aa" d="M214.627,294.646c0,0-18.763-22.139-17.332-31.296c1.76-11.267,49.999-66.548,49.999-66.548c-12.83-8.554-51.174,22.887-51.174,22.887s-21.001-17.957-18.272-19.29c9.236-5.005,3.256-3.985-0.346-6.766c3.245-15.14,14.442-12.786,40.568-49.999c11.264-16.045,4.758-16.249,4.758-16.249l1.769-12.861c10.344,12.643,83.146,34.762,88.893,91.08c5.747,56.318-26.453,89.041-26.453,89.041H214.627z"/><path fill="#00a888" d="M216.038,205.562c-10.818,6.664-19.919,14.127-19.919,14.127s-21.001-17.957-18.271-19.29c9.236-5.006,3.256-3.985-0.346-6.766c2.722-12.699,11.037-13.091,29.063-34.843l0,0C196.058,179.804,216.038,205.562,216.038,205.562z"/><path fill="#00a888" d="M220.978,228.34c-7.005,24.224,38.652,66.306,38.652,66.306h-45.004c0,0-18.94-22.169-17.332-31.296C198.65,255.656,220.978,228.34,220.978,228.34z"/></g></svg></div><h2>Horseoff</h2></div>
<div class="login-subtitle" id="loginSubtitle">Войдите в панель управления</div>
<div class="login-form">
<div class="form-group"><label class="form-label">Логин</label><input class="form-input" id="auth-user" placeholder="admin" autocomplete="username"/></div>
<div class="form-group"><label class="form-label">Пароль</label><div class="input-eye"><input class="form-input" id="auth-pass" type="password" placeholder="••••••••" autocomplete="current-password"/><button class="eye-btn" onclick="Shell.toggleEye(this)" type="button"><span class="ico ico-16 ico-eye-open"></span></button></div></div>
<div class="form-group" id="auth-confirm-group" style="display:none"><label class="form-label">Повторите пароль</label><div class="input-eye"><input class="form-input" id="auth-pass2" type="password" placeholder="••••••••"/><button class="eye-btn" onclick="Shell.toggleEye(this)" type="button"><span class="ico ico-16 ico-eye-open"></span></button></div></div>
<button class="login-btn" id="authBtn" onclick="Shell.handleAuth()">Войти</button>
<div class="login-error" id="authError"></div>
</div>
<div class="login-footer">horseoff <span class="app-version">v2.202.1</span><br>Created by k4nev with the support of mysika</div>
</div>
</div>
<!-- APP SHELL -->
<div class="app-shell" id="appShell">
<nav class="sidebar" id="sidebar">
<div class="sidebar-logo"><svg viewBox="155 100 195 295" xmlns="http://www.w3.org/2000/svg"><g transform="translate(505,0) scale(-1,1)"><rect x="202.843" y="339.947" fill="#00d4aa" width="122.157" height="45.529"/><rect x="175" y="339.947" fill="#00a888" width="27.843" height="45.529"/><rect x="182.95" y="299.899" fill="#00d4aa" width="133.277" height="34.786"/><rect x="182.959" y="299.899" fill="#00a888" width="46.326" height="34.786"/><path fill="#00d4aa" d="M214.627,294.646c0,0-18.763-22.139-17.332-31.296c1.76-11.267,49.999-66.548,49.999-66.548c-12.83-8.554-51.174,22.887-51.174,22.887s-21.001-17.957-18.272-19.29c9.236-5.005,3.256-3.985-0.346-6.766c3.245-15.14,14.442-12.786,40.568-49.999c11.264-16.045,4.758-16.249,4.758-16.249l1.769-12.861c10.344,12.643,83.146,34.762,88.893,91.08c5.747,56.318-26.453,89.041-26.453,89.041H214.627z"/><path fill="#00a888" d="M216.038,205.562c-10.818,6.664-19.919,14.127-19.919,14.127s-21.001-17.957-18.271-19.29c9.236-5.006,3.256-3.985-0.346-6.766c2.722-12.699,11.037-13.091,29.063-34.843l0,0C196.058,179.804,216.038,205.562,216.038,205.562z"/><path fill="#00a888" d="M220.978,228.34c-7.005,24.224,38.652,66.306,38.652,66.306h-45.004c0,0-18.94-22.169-17.332-31.296C198.65,255.656,220.978,228.34,220.978,228.34z"/></g></svg></div>
<div class="sidebar-modules" id="sidebarModules"></div>
<div class="sidebar-bottom">
<div id="sidebarVoiceBar" class="sb-voice-bar" style="display:none"></div>
<button class="sidebar-btn" id="profileBtn" onclick="Shell.openProfile()" title="Профиль">
<span class="ico ico-18 ico-profile"></span>
</button>
</div>
</nav>
<main class="content" id="moduleContent">
<div class="loading"><div class="spinner"></div>Загрузка...</div>
</main>
</div>
<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
<div class="modal prof-modal">
  <div class="modal-header">
    <div class="modal-title">Профиль</div>
    <button class="modal-close" onclick="Shell.closeModal('profileModal')"><span class="ico ico-18 ico-close"></span></button>
  </div>
  <!-- Identity block (always visible) -->
  <div class="prof-identity">
    <div class="profile-avatar" id="profileAvatar" onclick="Shell.pickAvatar()" title="Загрузить фото">
      <span class="profile-avatar-letter" id="profileAvatarLetter">?</span>
      <img class="profile-avatar-img" id="profileAvatarImg" style="display:none"/>
      <div class="profile-avatar-overlay"><svg width="20" height="20" viewBox="0 0 20 20" fill="#00d4aa"><path d="M10 8a3 3 0 1 0 0 6a3 3 0 0 0 0-6m8-3h-2.4a.89.89 0 0 1-.789-.57l-.621-1.861A.89.89 0 0 0 13.4 2H6.6c-.33 0-.686.256-.789.568L5.189 4.43A.89.89 0 0 1 4.4 5H2C.9 5 0 5.9 0 7v9c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2m-8 11a5 5 0 0 1-5-5a5 5 0 1 1 10 0a5 5 0 0 1-5 5m7.5-7.8a.7.7 0 1 1 0-1.4a.7.7 0 0 1 0 1.4"/></svg></div>
    </div>
    <input type="file" id="avatarFileInput" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="Shell.uploadAvatar(this)"/>
    <div class="prof-identity-info">
      <div class="prof-identity-name"><span id="profileDisplayName" style="font-size:17px;font-weight:700;color:var(--text)">—</span> <span class="role-badge" id="profileRole">—</span></div>
      <div class="prof-identity-username" id="profileUsername">@—</div>
      <button class="prof-avatar-remove" id="profileAvatarRemove" onclick="Shell.removeAvatar()" style="display:none">Удалить фото</button>
    </div>
  </div>
  <!-- Tabs -->
  <div class="prof-tabs">
    <button class="prof-tab active" id="profTab-account" onclick="Shell._switchProfileTab('account')">Аккаунт</button>
    <button class="prof-tab" id="profTab-security" onclick="Shell._switchProfileTab('security')">Безопасность</button>
    <button class="prof-tab" id="profTab-sessions" onclick="Shell._switchProfileTab('sessions')">Сессии</button>
  </div>
  <!-- Tab panes (fixed height container) -->
  <div class="prof-panes">
    <div class="prof-pane active" id="profPane-account">
      <div class="prof-section-lbl">ТЕМА ОФОРМЛЕНИЯ</div>
      <div class="theme-seg" id="themeSeg" style="width:100%">
        <button class="theme-seg-btn" data-theme="light" onclick="Shell.setTheme('light')">☀ Светлая</button>
        <button class="theme-seg-btn" data-theme="dark" onclick="Shell.setTheme('dark')">☾ Тёмная</button>
      </div>
      <div class="prof-section-lbl" style="margin-top:20px">ОТОБРАЖАЕМОЕ ИМЯ</div>
      <div style="display:flex;gap:8px">
        <input class="form-input" id="profDisplayName" placeholder="Не указано"/>
        <button class="btn btn-secondary" onclick="Shell.saveDisplayName()" style="white-space:nowrap">Сохранить</button>
      </div>
      <div class="form-hint" style="margin-top:6px">Только буквы и пробелы. Если не указано — отображается логин.</div>
    </div>
    <div class="prof-pane" id="profPane-security">
      <div class="form-group"><label class="prof-section-lbl">ТЕКУЩИЙ ПАРОЛЬ</label><div class="input-eye"><input class="form-input prof-pass-input" id="profOldPass" type="password" placeholder="••••••••"/><button class="eye-btn" onclick="Shell.toggleEye(this)" type="button"><span class="ico ico-16 ico-eye-open"></span></button></div></div>
      <div class="form-group"><label class="prof-section-lbl">НОВЫЙ ПАРОЛЬ</label><div class="input-eye"><input class="form-input prof-pass-input" id="profNewPass" type="password" placeholder="••••••••"/><button class="eye-btn" onclick="Shell.toggleEye(this)" type="button"><span class="ico ico-16 ico-eye-open"></span></button></div></div>
      <button class="btn btn-primary prof-btn-pill" onclick="Shell.changePassword()">Сменить пароль</button>
      <div class="prof-pin-row" id="profPinRow">
        <div class="prof-pin-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <div class="prof-pin-info">
          <div style="font-size:13px;font-weight:600;color:var(--text)">PIN-код</div>
          <div class="prof-pin-sub" id="profPinSub">Не настроен</div>
        </div>
        <div id="profPinBtn"></div>
      </div>
    </div>
    <div class="prof-pane" id="profPane-sessions">
      <div id="profileSessions"></div>
    </div>
  </div>
  <!-- Footer -->
  <div class="prof-footer">
    <span class="prof-session-count" id="profSessionCount"></span>
    <button class="btn btn-danger" onclick="Shell.logout()" style="gap:6px;flex:0;padding:8px 16px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Выйти
    </button>
  </div>
</div>
</div>

<script src="/core/shell.js"></script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js").catch(function(){})}</script>
</body>
</html>
